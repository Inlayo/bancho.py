<html>

<head>
  <!-- Title -->
  <title>{% block title %} - {{ appName() }}{% endblock %}</title>

  <!-- Favicon -->
  <link rel="shortcut icon" href="/static/favicon/favicon.ico" />

  <!-- Metadata -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />

  <!-- JQuery -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.3/jquery.min.js"
    integrity="sha512-STof4xm1wgkfm7heWqFJVn58Hm3EtS31XFaagaa8VMReCXAkQnJZ+jEy8PCC/iT18dFy95WcExNHFTqLyp72eQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <!-- Bulma -->
  <link rel="stylesheet" href="/static/css/bulma.css" />

  <!-- Font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css" 
    integrity="sha512-xh6O/CkMol6+AJkSxx3zVHN6qaxL8FzJrddXnUk60lE+Y2q+v0Sf2qcX7xpvd+GLPIeUaiWLNSF9h7z3SFsFOg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Custom style -->
  <link rel="stylesheet" href="/static/css/style.css" />

  {% block header %} {% endblock %}
</head>

<body>
  <!-- Header -->
  {% include 'components/navbar.html' %}

  <!-- Content -->
  <div class="container is-fullhd my-con">
    {% block content %} {% endblock %}
  </div>

  <!-- Footer -->
  {% include 'components/footer.html' %}

  <!-- Main JS script -->
  <script src="/static/js/main.js" crossorigin="anonymous"></script>

  <!-- Customisation -->
  {% block bottom %}{% endblock %}
</body>

</html>
