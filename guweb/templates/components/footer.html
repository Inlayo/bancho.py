<footer class="footer">
    <div class="content has-text-centered">
        <div class="level">
            <div class="level-left"></div>
            <div class="level-item">
                <span style="color: var(--text-primary);">{{ appName() }} <strong style="color: var(--primary);">v{{ appVersion() }}</strong></span>
            </div>
            <div class="level-right">
                <div class="level-item">
                    <div style="display: flex; gap: 16px;">
                        <a class="foot-link" href="/github" title="GitHub" style="transition: all 0.3s ease; color: var(--text-secondary);">
                            <i class="fab fa-github"></i>
                        </a>
                        <a class="foot-link" href="/discord" title="Discord" style="transition: all 0.3s ease; color: var(--text-secondary);">
                            <i class="fab fa-discord"></i>
                        </a>
                        <a class="foot-link" href="/youtube" title="YouTube" style="transition: all 0.3s ease; color: var(--text-secondary);">
                            <i class="fab fa-youtube"></i>
                        </a>
                        <a class="foot-link" href="/twitter" title="Twitter" style="transition: all 0.3s ease; color: var(--text-secondary);">
                            <i class="fab fa-twitter"></i>
                        </a>
                        <a class="foot-link" href="/instagram" title="Instagram" style="transition: all 0.3s ease; color: var(--text-secondary);">
                            <i class="fab fa-instagram"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</footer>
